# Active when SPRING_PROFILES_ACTIVE includes `platform` (see docker-compose.platform.yml).
spring:
  config:
    activate:
      on-profile: platform
  cloud:
    gateway:
      routes:
        - id: post-service
          uri: ${POST_SERVICE_URI:http://post-service:8081}
          predicates:
            - Path=/posts/**
        - id: follow-service
          uri: ${FOLLOW_SERVICE_URI:http://follow-service:8082}
          predicates:
            - Path=/follows/**
        - id: feed-service
          uri: ${FEED_SERVICE_URI:http://feed-service:8083}
          predicates:
            - Path=/feed/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:http://notification-service:8084}
          predicates:
            - Path=/notifications/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URI:http://media-service:8085}
          predicates:
            - Path=/media/**
