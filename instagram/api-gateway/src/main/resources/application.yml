spring:
  application:
    name: api-gateway
  codec:
    # Allow multipart image/video bodies proxied to post-service without buffering failures.
    max-in-memory-size: 32MB
  # Gateway parses multipart as WebFlux; defaults (~256KB) are too small for real images.
  # REST-only: disable filters that can read/consume the request body before routing.
  webflux:
    multipart:
      max-in-memory-size: 32MB
      max-file-size: 32MB
      max-request-size: 40MB
    hiddenmethod:
      filter:
        enabled: false
    formcontent:
      filter:
        enabled: false
  cloud:
    gateway:
      # Gzip on multipart upstream requests breaks many proxies / backends.
      httpclient:
        compression: false
      # Posts + follows (DynamoDB); feed/notifications/media added when gateway profile `platform` is active.
      routes:
        - id: post-service
          uri: ${POST_SERVICE_URI:http://post-service:8081}
          predicates:
            - Path=/posts/**
        - id: follow-service
          uri: ${FOLLOW_SERVICE_URI:http://follow-service:8082}
          predicates:
            - Path=/follows/**

server:
  port: 8080
